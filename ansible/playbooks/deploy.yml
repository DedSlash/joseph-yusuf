---
- name: Deploy Joseph Yusuf application
  hosts: all
  gather_facts: false

  pre_tasks:
    - name: Backup current .env
      ansible.builtin.copy:
        src: "{{ app_dir }}/.env"
        dest: "{{ app_dir }}/.env.bak"
        remote_src: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: '0600'
      ignore_errors: true

  roles:
    - role: app
