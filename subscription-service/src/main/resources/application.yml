server:
  port: 8086

spring:
  application:
    name: subscription-service

  datasource:
    url: jdbc:postgresql://localhost:5432/joseph_db?currentSchema=joseph_subscriptions
    username: joseph
    password: ${DB_PASSWORD:joseph_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: joseph_subscriptions
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    schemas: joseph_subscriptions
    default-schema: joseph_subscriptions

jwt:
  secret: ${JWT_SECRET:am9zZXBoeXVzdWYtand0LXNlY3JldC1rZXktMjAyNi1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZA==}

stripe:
  api:
    key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_test_placeholder}
  prices:
    # Montants d'affichage (pour calcul "nextInvoiceAmount" et cohérence DB)
    premium-eur: 499
    premium-plus-eur: 999
    premium-xof: 3000
    premium-plus-xof: 6000
    # Stripe Price IDs (créés dans le Stripe Dashboard — Products > Prices)
    premium-monthly-eur: ${STRIPE_PRICE_PREMIUM_EUR:price_premium_eur_placeholder}
    premium-monthly-xof: ${STRIPE_PRICE_PREMIUM_XOF:price_premium_xof_placeholder}
    premium-plus-monthly-eur: ${STRIPE_PRICE_PREMIUM_PLUS_EUR:price_premium_plus_eur_placeholder}
    premium-plus-monthly-xof: ${STRIPE_PRICE_PREMIUM_PLUS_XOF:price_premium_plus_xof_placeholder}

paydunya:
  master-key: ${PAYDUNYA_MASTER_KEY:test_master_key}
  private-key: ${PAYDUNYA_PRIVATE_KEY:test_private_key}
  token: ${PAYDUNYA_TOKEN:test_token}
  mode: ${PAYDUNYA_MODE:test}
  callback-url: ${PAYDUNYA_CALLBACK_URL:http://localhost:8080/api/webhooks/paydunya}
  return-url: ${PAYDUNYA_RETURN_URL:http://localhost:4200/subscription/success}
  cancel-url: ${PAYDUNYA_CANCEL_URL:http://localhost:4200/subscription}

paytech:
  api-key: ${PAYTECH_API_KEY:test_paytech_api_key}
  api-secret: ${PAYTECH_API_SECRET:test_paytech_api_secret}
  env: ${PAYTECH_ENV:test}
  success-url: ${PAYTECH_SUCCESS_URL:http://localhost:4200/subscription/success}
  cancel-url: ${PAYTECH_CANCEL_URL:http://localhost:4200/subscription}
  ipn-url: ${PAYTECH_IPN_URL:http://localhost:8080/api/webhooks/paytech}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgresql:5432/joseph_db?currentSchema=joseph_subscriptions
    username: ${DB_USER:joseph}
    password: ${DB_PASSWORD:joseph_secret}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: subscription-service
