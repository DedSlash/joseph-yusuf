server:
  port: 8086

spring:
  application:
    name: subscription-service

  datasource:
    url: jdbc:postgresql://localhost:5432/joseph_db?currentSchema=joseph_subscriptions
    username: joseph
    password: ${DB_PASSWORD:joseph_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: joseph_subscriptions
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    schemas: joseph_subscriptions
    default-schema: joseph_subscriptions

jwt:
  secret: ${JWT_SECRET:am9zZXBoeXVzdWYtand0LXNlY3JldC1rZXktMjAyNi1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZA==}

stripe:
  api:
    key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_test_placeholder}
  prices:
    premium-eur: 499
    premium-plus-eur: 999
    premium-xof: 3000
    premium-plus-xof: 6000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgresql:5432/joseph_db?currentSchema=joseph_subscriptions
    username: ${DB_USER:joseph}
    password: ${DB_PASSWORD:joseph_secret}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: subscription-service
