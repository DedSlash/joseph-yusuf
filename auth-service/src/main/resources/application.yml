server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/joseph_db?currentSchema=joseph_auth
    username: joseph
    password: ${DB_PASSWORD:joseph_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: joseph_auth
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    schemas: joseph_auth
    default-schema: joseph_auth

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:no-reply@josephyusuf.com}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

app:
  reset-url: ${RESET_URL:http://localhost:4200/reset-password}
  super-admin-emails: ${SUPER_ADMIN_EMAILS:admin@josephyusuf.com}
  super-admin-default-password: ${SUPER_ADMIN_DEFAULT_PASSWORD:}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  subscription-url: ${SUBSCRIPTION_URL:http://localhost:4200/subscription}
  conversion-emails:
    enabled: ${CONVERSION_EMAILS_ENABLED:false}
  payments:
    active: ${PAYMENTS_ACTIVE:false}
  trial:
    extension-days: ${TRIAL_EXTENSION_DAYS:30}
  internal:
    token: ${INTERNAL_API_TOKEN:}

jwt:
  secret: ${JWT_SECRET:am9zZXBoeXVzdWYtand0LXNlY3JldC1rZXktMjAyNi1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZA==}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgresql:5432/joseph_db?currentSchema=joseph_auth
    username: ${DB_USER:joseph}
    password: ${DB_PASSWORD:joseph_secret}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: auth-service
