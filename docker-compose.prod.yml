      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/${DB_NAME}?currentSchema=joseph_subscriptions
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_PRICE_PREMIUM_EUR=${STRIPE_PRICE_PREMIUM_EUR}
      - STRIPE_PRICE_PREMIUM_XOF=${STRIPE_PRICE_PREMIUM_XOF}
      - STRIPE_PRICE_PREMIUM_PLUS_EUR=${STRIPE_PRICE_PREMIUM_PLUS_EUR}
      - STRIPE_PRICE_PREMIUM_PLUS_XOF=${STRIPE_PRICE_PREMIUM_PLUS_XOF}
      - PAYDUNYA_MASTER_KEY=${PAYDUNYA_MASTER_KEY}
      - PAYDUNYA_PRIVATE_KEY=${PAYDUNYA_PRIVATE_KEY}
      - PAYDUNYA_TOKEN=${PAYDUNYA_TOKEN}
      - PAYDUNYA_MODE=${PAYDUNYA_MODE}
      - PAYTECH_API_KEY=${PAYTECH_API_KEY}
      - PAYTECH_API_SECRET=${PAYTECH_API_SECRET}
      - PAYTECH_ENV=${PAYTECH_ENV}
      - PAYTECH_SUCCESS_URL=${PAYTECH_SUCCESS_URL}
      - PAYTECH_CANCEL_URL=${PAYTECH_CANCEL_URL}
      - PAYTECH_IPN_URL=${PAYTECH_IPN_URL}
      - PAYTECH_REFUND_NOTIF_URL=${PAYTECH_REFUND_NOTIF_URL}
