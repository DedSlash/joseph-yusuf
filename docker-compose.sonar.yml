# SonarQube — LOCAL/CI uniquement (ne PAS déployer sur le VPS prod)
# Usage : docker compose -f docker-compose.sonar.yml up -d
services:
  sonar_db:
    image: postgres:15
    container_name: joseph_sonar_db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar_secret}
      POSTGRES_DB: sonar_db
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    networks:
      - sonar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sonarqube:
    image: sonarqube:10-community
    container_name: joseph_sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar_db
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar_secret}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_SEARCH_JAVAOPTS: "-Xms512m -Xmx512m"
      SONAR_SEARCH_JAVAADDITIONALOPTS: "-Dnode.store.allow_mmap=false"
      # Watermarks ES (low=97%/high=98%/flood_stage=99%) appliqués en `persistent`
      # via l'API _cluster/settings — pas configurable en JVM -D (ignoré par ES
      # pour raisons de sécurité). Settings stockés dans le volume sonarqube_data,
      # survivent aux restarts. Pour les (ré)appliquer manuellement :
      #   docker exec joseph_sonarqube curl -s -X PUT \
      #     "http://localhost:9001/_cluster/settings" \
      #     -H "Content-Type: application/json" -d '{"persistent":{ \
      #       "cluster.routing.allocation.disk.watermark.low":"97%", \
      #       "cluster.routing.allocation.disk.watermark.high":"98%", \
      #       "cluster.routing.allocation.disk.watermark.flood_stage":"99%", \
      #       "cluster.routing.allocation.disk.watermark.flood_stage.frozen":"99%"}}'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      sonar_db:
        condition: service_healthy
    networks:
      - sonar-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  sonar_postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  sonar-network:
    driver: bridge
