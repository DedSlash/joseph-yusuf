server:
  port: 8088

spring:
  application:
    name: support-service

  datasource:
    url: jdbc:postgresql://localhost:5432/joseph_db?currentSchema=joseph_support
    username: joseph
    password: ${DB_PASSWORD:joseph_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: joseph_support
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    schemas: joseph_support
    default-schema: joseph_support

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:no-reply@josephyusuf.com}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

app:
  support-url: ${SUPPORT_URL:http://localhost:4200/support}

jwt:
  secret: ${JWT_SECRET:am9zZXBoeXVzdWYtand0LXNlY3JldC1rZXktMjAyNi1kZXYtb25seS1jaGFuZ2UtaW4tcHJvZA==}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgresql:5432/joseph_db?currentSchema=joseph_support
    username: ${DB_USER:joseph}
    password: ${DB_PASSWORD:joseph_secret}

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: false
    hostname: support-service
